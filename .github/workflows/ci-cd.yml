name: CI/CD - Cidades ESG Inteligentes

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build da aplicação
        run: mvn clean package -DskipTests

      - name: Executar testes automatizados
        run: mvn test

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t cidades-esg-inteligentes:latest .

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Subir ambiente de staging com Docker Compose
        run: docker compose up -d postgres-staging app-staging

      - name: Aguardar aplicação staging
        run: sleep 35

      - name: Validar ambiente staging
        run: curl -f http://localhost:8081/api/cidades/status

      - name: Encerrar staging
        if: always()
        run: docker compose down

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Subir ambiente de produção com Docker Compose
        run: docker compose up -d postgres-production app-production

      - name: Aguardar aplicação produção
        run: sleep 35

      - name: Validar ambiente produção
        run: curl -f http://localhost:8082/api/cidades/status

      - name: Encerrar produção
        if: always()
        run: docker compose down
